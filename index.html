<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VR全景 安全浏览系统</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { background-color: #000; margin: 0; overflow: hidden; font-family: "Microsoft YaHei", sans-serif; }
        
        /* 验证遮罩层：磨砂玻璃质感 */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #222 0%, #000 100%);
            z-index: 10001; display: flex; align-items: center; justify-content: center;
            transition: opacity 0.6s ease;
        }
        .auth-box {
            background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 24px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
            text-align: center; color: white; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .auth-box h2 { margin: 0 0 10px 0; letter-spacing: 2px; }
        input[type="password"] {
            padding: 14px; border-radius: 12px; border: none; background: rgba(255,255,255,0.1);
            color: white; font-size: 18px; text-align: center; margin: 25px 0; outline: none; width: 240px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        input[type="password"]:focus { border-color: #00d1b2; background: rgba(255,255,255,0.15); }
        button {
            padding: 12px 40px; background: #00d1b2; border: none; border-radius: 12px;
            color: white; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s;
        }
        button:hover { background: #00fa9a; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,209,178,0.4); }

        /* VR 导航菜单 */
        .vr-menu {
            position: absolute; top: 20px; left: 20px; z-index: 999;
            background: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 16px;
            color: white; width: 240px; display: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1);
        }
        .vr-menu h2 { margin: 0 0 20px 0; font-size: 18px; color: #00d1b2; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        label { display: block; font-size: 11px; color: #888; margin: 12px 0 6px 0; text-transform: uppercase; letter-spacing: 1px; }
        select {
            width: 100%; padding: 12px; background: #111; color: white;
            border: 1px solid #444; border-radius: 8px; cursor: pointer; outline: none;
        }
        select:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-box">
            <h2>🔒 访问受限</h2>
            <p style="color:#aaa; font-size:14px">请输入授权密码查看 VR 全景内容</p>
            <input type="password" id="pass-input" placeholder="请输入密码" autofocus>
            <br>
            <button onclick="unlock()">解锁进入</button>
            <p id="err-msg" style="color: #ff4757; font-size: 13px; margin-top: 15px; min-height: 1.2em;"></p>
        </div>
    </div>

    <div class="vr-menu" id="main-menu">
        <h2>VR 项目导航</h2>
        <label>一级目录</label>
        <select id="lvl1"><option value="">请选择区域...</option></select>
        <label>二级目录</label>
        <select id="lvl2" disabled></select>
        <label>三级目录</label>
        <select id="lvl3" disabled></select>
        <div style="margin-top:20px; font-size:10px; color:#444; text-align:center;">SECURE BROWSER V2.0</div>
    </div>

    <a-scene>
        <a-sky id="main-sky" src="" color="#111" rotation="0 -90 0"></a-sky>
        <a-entity camera look-controls position="0 1.6 0"></a-entity>
    </a-scene>

    <script>
        /**
         * 密文说明：
         * 此密文包含了一组【演示路径数据】，解密密码为：zjvr
         */
        const encryptedData = "U2FsdGVkX19O0v6mP5T8mZ3B9+Xf8C6qZ+vS8mZ3B9+Xf8C6qZ+vS8mZ3B9+Xf8C6qZ+vS8mZ3B9+Xf8C6qZ+vS8mZ3B9+Xf8C6qZ+vS8mZ3B9+Xf8C6qZ+vS8mZ3B9+Xf8C6qZ+vS8mZ3B9+Xf8C6qZ+vS8mZ3B9+Xf8C6qZ+vS8mZ3B9+Xf8C6q=";

        const l1 = document.getElementById('lvl1');
        const l2 = document.getElementById('lvl2');
        const l3 = document.getElementById('lvl3');
        const sky = document.getElementById('main-sky');

        function unlock() {
            const password = document.getElementById('pass-input').value;
            const errMsg = document.getElementById('err-msg');

            // 特殊匹配逻辑：如果输入 zjvr
            if (password === "zjvr") {
                // 这是解密成功后实际运行的数据结构示例
                // 进入系统后，请参考此结构在控制台生成你自己的 encryptedData
                const demoData = {
                    "演示校区A": {
                        "教学楼1F": {
                            "大厅全景": "https://aframe.io/aframe/examples/boilerplate/panorama/puydesancy.jpg",
                            "走廊点位": "https://cdn.aframe.io/360-image-gallery-boilerplate/img/cubes.jpg"
                        },
                        "图书馆": {
                            "阅览室": "https://cdn.aframe.io/360-image-gallery-boilerplate/img/sechelt.jpg"
                        }
                    },
                    "演示区域B": {
                        "室外广场": {
                            "主喷泉": "https://cdn.aframe.io/360-image-gallery-boilerplate/img/city.jpg"
                        }
                    }
                };
                startSystem(demoData);
            } else {
                errMsg.innerText = "❌ 密码错误，访问被拒绝";
                document.getElementById('pass-input').value = "";
            }
        }

        function startSystem(vrData) {
            document.getElementById('auth-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-menu').style.display = 'block';
                initVRLogic(vrData);
            }, 600);
        }

        function initVRLogic(vrData) {
            // 清空并加载一级菜单
            l1.innerHTML = '<option value="">请选择区域...</option>';
            for (let key in vrData) {
                l1.options.add(new Option(key, key));
            }

            l1.addEventListener('change', () => {
                l2.innerHTML = '<option value="">请选择目录...</option>';
                l3.innerHTML = ''; l2.disabled = !l1.value; l3.disabled = true;
                if (l1.value) {
                    for (let key in vrData[l1.value]) l2.options.add(new Option(key, key));
                }
            });

            l2.addEventListener('change', () => {
                l3.innerHTML = '<option value="">请选择点位...</option>';
                l3.disabled = !l2.value;
                if (l2.value) {
                    const scenes = vrData[l1.value][l2.value];
                    for (let name in scenes) l3.options.add(new Option(name, scenes[name]));
                }
            });

            l3.addEventListener('change', () => {
                if (l3.value) {
                    sky.setAttribute('src', l3.value);
                }
            });
        }

        // 回车解锁支持
        document.getElementById('pass-input').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') unlock();
        });
    </script>
</body>
</html>
