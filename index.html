<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VR全景 极速浏览版</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        body { background-color: #000; margin: 0; overflow: hidden; font-family: "Microsoft YaHei", sans-serif; }
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 10001; display: flex; align-items: center; justify-content: center;
        }
        .auth-box { text-align: center; color: white; background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; backdrop-filter: blur(10px); }
        input { padding: 12px; border-radius: 8px; border: none; margin: 20px 0; width: 200px; text-align: center; }
        button { padding: 10px 30px; background: #00d1b2; color: white; border: none; border-radius: 8px; cursor: pointer; }
        
        .vr-menu {
            position: absolute; top: 20px; left: 20px; z-index: 999;
            background: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 12px;
            color: white; width: 240px; display: none; border: 1px solid #333;
        }
        select { width: 100%; padding: 10px; background: #222; color: white; border: 1px solid #444; border-radius: 5px; margin-bottom: 10px; }
        #status-msg { color: #00fa9a; font-size: 13px; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-box">
            <h2>🔒 安全验证</h2>
            <input type="password" id="pass-input" placeholder="请输入授权密码" autofocus>
            <br><button onclick="unlock()">解锁进入</button>
            <p id="err-msg" style="color: #ff4757;"></p>
        </div>
    </div>

    <div class="vr-menu" id="main-menu">
        <h3 style="margin-top:0; color:#00d1b2;">VR 项目导航</h3>
        <select id="lvl1"><option value="">选择区域</option></select>
        <select id="lvl2" disabled></select>
        <select id="lvl3" disabled></select>
        <div id="status-msg">系统已准备就绪</div>
    </div>

    <a-scene>
        <a-assets timeout="10000">
            </a-assets>
        
        <a-sky id="main-sky" color="#000" rotation="0 -90 0"></a-sky>
        <a-entity camera look-controls position="0 1.6 0"></a-entity>
    </a-scene>

    <script>
        const l1 = document.getElementById('lvl1');
        const l2 = document.getElementById('lvl2');
        const l3 = document.getElementById('lvl3');
        const sky = document.getElementById('main-sky');
        const status = document.getElementById('status-msg');

        function unlock() {
            if (document.getElementById('pass-input').value === "zjvr") {
                const realData = {
                    "时间地点事件": {
                        "202310十一广东": {
                            "全景点位_1": "VR/时间地点事件/202310十一广东/20231001_145635.jpg"
                        },
                        "20230107重庆两江游船": {
                            "码头全景": "VR/时间地点事件/20230107重庆两江游船/演示场景.jpg"
                        }
                    }
                };
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-menu').style.display = 'block';
                initVR(realData);
            } else {
                document.getElementById('err-msg').innerText = "密码错误";
            }
        }

        function initVR(vrData) {
            for (let key in vrData) l1.options.add(new Option(key, key));

            l1.onchange = () => {
                l2.innerHTML = '<option value="">选择目录</option>';
                l3.innerHTML = ''; l2.disabled = !l1.value;
                if (l1.value) for (let key in vrData[l1.value]) l2.options.add(new Option(key, key));
            };

            l2.onchange = () => {
                l3.innerHTML = '<option value="">选择点位</option>';
                l3.disabled = !l2.value;
                if (l2.value) {
                    const scenes = vrData[l1.value][l2.value];
                    for (let name in scenes) l3.options.add(new Option(name, scenes[name]));
                }
            };

            l3.onchange = () => {
                if (!l3.value) return;
                
                status.innerText = "⏳ 正在渲染 3D 场景...";
                status.style.color = "#ffdd57";

                const finalPath = encodeURI(l3.value);
                
                // 解决黑屏的核心技巧：先重置再赋值，并强制刷新组件
                sky.setAttribute('src', ''); 
                
                const loader = new Image();
                loader.crossOrigin = "anonymous"; // 必须开启跨域许可
                loader.onload = function() {
                    // 图片真正载入内存后，再交给 A-Frame 渲染
                    sky.setAttribute('src', finalPath);
                    status.innerText = "✅ 渲染成功";
                    status.style.color = "#00fa9a";
                };
                loader.onerror = function() {
                    status.innerText = "❌ 资源加载异常";
                    status.style.color = "#ff4757";
                };
                loader.src = finalPath;
            };
        }
    </script>
</body>
</html>
