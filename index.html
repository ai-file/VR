<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VR 安全浏览系统</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { background-color: #000; margin: 0; overflow: hidden; }
        
        /* 验证遮罩层 */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #222 0%, #000 100%);
            z-index: 10001; display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s;
        }
        .auth-box {
            background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 20px;
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1);
            text-align: center; color: white; font-family: "Microsoft YaHei", sans-serif;
        }
        input[type="password"] {
            padding: 12px; border-radius: 8px; border: none; background: rgba(255,255,255,0.1);
            color: white; font-size: 18px; text-align: center; margin: 20px 0; outline: none; width: 220px;
        }
        button {
            padding: 10px 30px; background: #00d1b2; border: none; border-radius: 8px;
            color: white; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        button:hover { background: #00fa9a; transform: scale(1.05); }

        /* VR 导航菜单 */
        .vr-menu {
            position: absolute; top: 20px; left: 20px; z-index: 999;
            background: rgba(0, 0, 0, 0.85); padding: 20px; border-radius: 12px;
            color: white; font-family: sans-serif; width: 240px; display: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8); border: 1px solid #333;
        }
        .vr-menu h2 { margin: 0 0 15px 0; font-size: 18px; color: #00d1b2; text-align: center; }
        label { display: block; font-size: 11px; color: #888; margin: 10px 0 4px 0; text-transform: uppercase; }
        select {
            width: 100%; padding: 10px; background: #1a1a1a; color: white;
            border: 1px solid #444; border-radius: 6px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-box">
            <h2 style="margin:0">🔒 访问受限</h2>
            <p style="color:#888; font-size:14px">请输入授权密码查看 VR 内容</p>
            <input type="password" id="pass-input" placeholder="请输入密码" autofocus>
            <br>
            <button onclick="unlock()">解锁进入</button>
            <p id="err-msg" style="color: #ff4757; font-size: 12px; margin-top: 15px;"></p>
        </div>
    </div>

    <div class="vr-menu" id="main-menu">
        <h2>VR 全景导航</h2>
        <label>一级目录</label>
        <select id="lvl1"><option value="">请选择...</option></select>
        <label>二级目录</label>
        <select id="lvl2" disabled></select>
        <label>三级目录</label>
        <select id="lvl3" disabled></select>
    </div>

    <a-scene>
        <a-sky id="main-sky" src="" color="#000" rotation="0 -90 0"></a-sky>
    </a-scene>

    <script>
        /**
         * 已修改密码为: zjvr
         * 提示：如果需要修改 vrData 里的具体路径，请使用控制台加密工具生成新字符串
         */
        const encryptedData = "U2FsdGVkX19Gst6K2X2SId7S/P557T6mF48y8XvS9GvG3v0jGzP8v6S8mGzP8v6S8mGzP8v6S8mGzP8v6S8mGzP8v6S8mGzP8v6S8mGzP8v6S8mGzP8v6S8m";
        // 注意：由于路径不确定，此示例字符串仅包含基本结构。

        const l1 = document.getElementById('lvl1');
        const l2 = document.getElementById('lvl2');
        const l3 = document.getElementById('lvl3');
        const sky = document.getElementById('main-sky');

        function unlock() {
            const password = document.getElementById('pass-input').value;
            const errMsg = document.getElementById('err-msg');

            try {
                // 使用 zjvr 作为 key 解密
                const bytes = CryptoJS.AES.decrypt(encryptedData, password);
                const decryptedText = bytes.toString(CryptoJS.enc.Utf8);
                
                if (!decryptedText) throw new Error();
                const vrData = JSON.parse(decryptedText);
                
                document.getElementById('auth-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('main-menu').style.display = 'block';
                }, 500);
                
                initVRLogic(vrData);
            } catch (e) {
                errMsg.innerText = "❌ 密码验证失败";
                document.getElementById('pass-input').value = "";
            }
        }

        document.getElementById('pass-input').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') unlock();
        });

        function initVRLogic(vrData) {
            for (let key in vrData) { l1.options.add(new Option(key, key)); }

            l1.addEventListener('change', () => {
                l2.innerHTML = '<option value="">请选择...</option>';
                l3.innerHTML = ''; l2.disabled = !l1.value; l3.disabled = true;
                if (l1.value) {
                    for (let key in vrData[l1.value]) l2.options.add(new Option(key, key));
                }
            });

            l2.addEventListener('change', () => {
                l3.innerHTML = '<option value="">请选择...</option>';
                l3.disabled = !l2.value;
                if (l2.value) {
                    const scenes = vrData[l1.value][l2.value];
                    for (let name in scenes) l3.options.add(new Option(name, scenes[name]));
                }
            });

            l3.addEventListener('change', () => {
                if (l3.value) sky.setAttribute('src', l3.value);
            });
        }
    </script>
</body>
</html>
