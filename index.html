<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>三级分类 VR 浏览</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        .vr-menu {
            position: absolute; top: 20px; left: 20px; z-index: 999;
            background: rgba(0, 0, 0, 0.85); padding: 15px; border-radius: 12px;
            color: white; font-family: sans-serif; width: 220px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .vr-menu h2 { margin: 0 0 15px 0; font-size: 18px; color: #00d1b2; text-align: center; }
        .select-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: #aaa; margin-bottom: 4px; text-transform: uppercase; }
        select {
            width: 100%; padding: 10px; background: #222; color: white;
            border: 1px solid #444; border-radius: 6px; cursor: pointer;
        }
        select:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="vr-menu">
        <h2>VR 全景导航</h2>
        
        <div class="select-group">
            <label>一级分类</label>
            <select id="lvl1"><option value="">请选择分类...</option></select>
        </div>

        <div class="select-group">
            <label>二级分类</label>
            <select id="lvl2" disabled><option value="">请先选择一级</option></select>
        </div>

        <div class="select-group">
            <label>三级分类</label>
            <select id="lvl3" disabled><option value="">请先选择二级</option></select>
        </div>
    </div>

    <a-scene>
        <a-sky id="main-sky" src="" color="#111" animation="property: ocapity; from: 0; to: 1; dur: 500"></a-sky>
    </a-scene>

    <script>
        // 1. 数据配置中心
        const vrData = {
            "时间流": {
                "一楼": {
                    "大厅": "img/admin/1f/lobby.jpg",
                    "接待室": "img/admin/1f/reception.jpg"
                },
                "二楼": {
                    "会议室": "img/admin/2f/meeting.jpg"
                }
            },
            "时间地点事件": {
                "202310十一广东": {
                    "单人间": "img/life/dorm/room1.jpg",
                    "公共区": "img/life/dorm/public.jpg"
                },
                "食堂": {
                    "一楼档口": "img/life/canteen/f1.jpg"
                }
            }
        };

        const l1 = document.getElementById('lvl1');
        const l2 = document.getElementById('lvl2');
        const l3 = document.getElementById('lvl3');
        const sky = document.getElementById('main-sky');

        // 初始化一级菜单
        for (let key in vrData) {
            let opt = new Option(key, key);
            l1.options.add(opt);
        }

        // 监听一级变化 -> 更新二级
        l1.addEventListener('change', () => {
            l2.innerHTML = '<option value="">请选择二级...</option>';
            l3.innerHTML = '<option value="">请选择三级...</option>';
            l3.disabled = true;
            
            if (l1.value) {
                l2.disabled = false;
                for (let key in vrData[l1.value]) {
                    l2.options.add(new Option(key, key));
                }
            } else {
                l2.disabled = true;
            }
        });

        // 监听二级变化 -> 更新三级
        l2.addEventListener('change', () => {
            l3.innerHTML = '<option value="">请选择三级...</option>';
            
            if (l2.value) {
                l3.disabled = false;
                const scenes = vrData[l1.value][l2.value];
                for (let name in scenes) {
                    l3.options.add(new Option(name, scenes[name]));
                }
            } else {
                l3.disabled = true;
            }
        });

        // 监听三级变化 -> 切换图片
        l3.addEventListener('change', () => {
            if (l3.value) {
                // 切换图片路径
                sky.setAttribute('src', l3.value);
            }
        });
    </script>
</body>
</html>
