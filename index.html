<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VR全景 安全浏览系统</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        body { background-color: #000; margin: 0; overflow: hidden; font-family: "Microsoft YaHei", sans-serif; }
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #222 0%, #000 100%);
            z-index: 10001; display: flex; align-items: center; justify-content: center;
            transition: opacity 0.6s ease;
        }
        .auth-box {
            background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 24px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
            text-align: center; color: white; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        input[type="password"] {
            padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1); color: white; font-size: 18px; text-align: center;
            margin: 25px 0; outline: none; width: 240px;
        }
        button {
            padding: 12px 40px; background: #00d1b2; border: none; border-radius: 12px;
            color: white; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s;
        }
        .vr-menu {
            position: absolute; top: 20px; left: 20px; z-index: 999;
            background: rgba(0, 0, 0, 0.85); padding: 20px; border-radius: 16px;
            color: white; width: 260px; display: none; border: 1px solid rgba(255,255,255,0.1);
        }
        .vr-menu h2 { margin: 0 0 20px 0; font-size: 18px; color: #00d1b2; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        label { display: block; font-size: 11px; color: #888; margin: 12px 0 6px 0; }
        select { width: 100%; padding: 12px; background: #111; color: white; border: 1px solid #444; border-radius: 8px; outline: none; margin-bottom: 10px; }
        
        /* 进度条样式 */
        #progress-container { width: 100%; background: #222; border-radius: 10px; height: 12px; margin-top: 15px; display: none; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00d1b2, #00fa9a); transition: width 0.3s; }
        #progress-text { color: #00d1b2; font-size: 12px; margin-top: 5px; text-align: center; display: none; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-box">
            <h2>🔒 访问受限</h2>
            <p style="color:#aaa; font-size:14px">请输入授权密码查看 VR 全景内容</p>
            <input type="password" id="pass-input" placeholder="请输入密码" autofocus>
            <br>
            <button onclick="unlock()">解锁进入</button>
            <p id="err-msg" style="color: #ff4757; font-size: 13px; margin-top: 15px;"></p>
        </div>
    </div>

    <div class="vr-menu" id="main-menu">
        <h2>VR 全景导航</h2>
        <label>一级区域</label>
        <select id="lvl1"><option value="">请选择区域...</option></select>
        <label>二级目录</label>
        <select id="lvl2" disabled></select>
        <label>三级点位</label>
        <select id="lvl3" disabled></select>
        
        <div id="progress-container"><div id="progress-bar"></div></div>
        <div id="progress-text">等待选择...</div>
    </div>

    <a-scene loading-screen="enabled: false">
        <a-sky id="main-sky" color="#000" rotation="0 -90 0"></a-sky>
        <a-entity camera look-controls position="0 1.6 0"></a-entity>
    </a-scene>

    <script>
        const l1 = document.getElementById('lvl1');
        const l2 = document.getElementById('lvl2');
        const l3 = document.getElementById('lvl3');
        const sky = document.getElementById('main-sky');
        const pBar = document.getElementById('progress-bar');
        const pCont = document.getElementById('progress-container');
        const pText = document.getElementById('progress-text');

        function unlock() {
            const password = document.getElementById('pass-input').value;
            if (password === "zjvr") {
                const realData = {
                    "时间地点事件": {
                        "202310十一广东": {
                            "20231001_145635.jpg": "VR/时间地点事件/202310十一广东/20231001_145635.jpg"
                        },
                        "20230107重庆两江游船": {
                            "两江游船全景": "VR/时间地点事件/20230107重庆两江游船/演示场景.jpg"
                        }
                    }
                };
                startSystem(realData);
            } else {
                document.getElementById('err-msg').innerText = "❌ 密码错误";
            }
        }

        function startSystem(vrData) {
            document.getElementById('auth-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-menu').style.display = 'block';
                initVRLogic(vrData);
            }, 600);
        }

        function initVRLogic(vrData) {
            l1.innerHTML = '<option value="">请选择区域...</option>';
            for (let key in vrData) l1.options.add(new Option(key, key));

            l1.onchange = () => {
                l2.innerHTML = '<option value="">请选择目录...</option>';
                l3.innerHTML = ''; l2.disabled = !l1.value; l3.disabled = true;
                if (l1.value) for (let key in vrData[l1.value]) l2.options.add(new Option(key, key));
            };

            l2.onchange = () => {
                l3.innerHTML = '<option value="">请选择点位...</option>';
                l3.disabled = !l2.value;
                if (l2.value) {
                    const scenes = vrData[l1.value][l2.value];
                    for (let name in scenes) l3.options.add(new Option(name, scenes[name]));
                }
            };

            l3.onchange = () => {
                if (!l3.value) return;

                // 显示进度条
                pCont.style.display = 'block';
                pText.style.display = 'block';
                pBar.style.width = '10%';
                pText.innerText = "正在建立连接...";

                // 核心修正：处理中文路径编码
                const finalUrl = encodeURI(l3.value);

                const xhr = new XMLHttpRequest();
                xhr.open('GET', finalUrl, true);
                xhr.responseType = 'blob';

                xhr.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const percent = (e.loaded / e.total) * 100;
                        pBar.style.width = percent + '%';
                        pText.innerText = `加载中: ${Math.round(percent)}%`;
                    }
                };

                xhr.onload = () => {
                    if (xhr.status === 200) {
                        const imgUrl = URL.createObjectURL(xhr.response);
                        sky.setAttribute('src', imgUrl);
                        pBar.style.width = '100%';
                        pText.innerText = "✅ 加载完成";
                        setTimeout(() => {
                            pCont.style.display = 'none';
                            pText.innerText = "已就绪";
                        }, 1000);
                    } else {
                        pText.innerText = "❌ 文件不存在 (404)";
                    }
                };

                xhr.onerror = () => { pText.innerText = "❌ 网络连接失败"; };
                xhr.send();
            };
        }

        document.getElementById('pass-input').addEventListener('keyup', (e) => { if (e.key === 'Enter') unlock(); });
    </script>
</body>
</html>
