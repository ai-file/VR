<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VR全景 自动缩放优化版</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        body { background-color: #000; margin: 0; overflow: hidden; font-family: "Microsoft YaHei", sans-serif; }
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 10001; display: flex; align-items: center; justify-content: center;
        }
        .auth-box { text-align: center; color: white; background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        input { padding: 12px; border-radius: 8px; border: none; margin: 20px 0; width: 220px; text-align: center; font-size: 16px; background: #222; color: #fff; }
        button { padding: 12px 40px; background: #00d1b2; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .vr-menu {
            position: absolute; top: 20px; left: 20px; z-index: 999;
            background: rgba(0, 0, 0, 0.85); padding: 20px; border-radius: 12px;
            color: white; width: 260px; display: none; border: 1px solid #333;
        }
        select { width: 100%; padding: 12px; background: #222; color: white; border: 1px solid #444; border-radius: 6px; margin-bottom: 12px; }
        #status-text { font-size: 13px; color: #00fa9a; margin-top: 10px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-box">
            <h2>🔒 VR 安全系统</h2>
            <input type="password" id="pass-input" placeholder="请输入授权密码" autofocus>
            <br><button onclick="unlock()">解锁进入</button>
            <p id="err-msg" style="color: #ff4757;"></p>
        </div>
    </div>

    <div class="vr-menu" id="main-menu">
        <h3 style="margin:0 0 15px 0; color:#00d1b2; text-align:center;">VR 全景导航</h3>
        <select id="lvl1"><option value="">选择区域</option></select>
        <select id="lvl2" disabled></select>
        <select id="lvl3" disabled></select>
        <div id="status-text">系统就绪</div>
    </div>

    <a-scene loading-screen="enabled: false">
        <a-sky id="main-sky" rotation="0 -90 0" material="shader: flat; npot: true;"></a-sky>
        <a-entity camera look-controls position="0 1.6 0"></a-entity>
    </a-scene>

    <script>
        const l1 = document.getElementById('lvl1');
        const l2 = document.getElementById('lvl2');
        const l3 = document.getElementById('lvl3');
        const sky = document.getElementById('main-sky');
        const statusText = document.getElementById('status-text');

        function unlock() {
            if (document.getElementById('pass-input').value === "zjvr") {
                const realData = {
                    "时间地点事件": {
                        "202310十一广东": {
                            "全景画面_1": "VR/时间地点事件/202310十一广东/20231001_145635.jpg"
                        },
                        "20230107重庆两江游船": {
                            "游船实拍": "VR/时间地点事件/20230107重庆两江游船/20230107_174542.jpg"
                        }
                    }
                };
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-menu').style.display = 'block';
                initVR(realData);
            } else {
                document.getElementById('err-msg').innerText = "密码错误";
            }
        }

        function initVR(vrData) {
            for (let key in vrData) l1.options.add(new Option(key, key));

            l1.onchange = () => {
                l2.innerHTML = '<option value="">选择目录</option>';
                l3.innerHTML = ''; l2.disabled = !l1.value;
                if (l1.value) for (let key in vrData[l1.value]) l2.options.add(new Option(key, key));
            };

            l2.onchange = () => {
                l3.innerHTML = '<option value="">选择点位</option>';
                l3.disabled = !l2.value;
                if (l2.value) {
                    const scenes = vrData[l1.value][l2.value];
                    for (let name in scenes) l3.options.add(new Option(name, scenes[name]));
                }
            };

            l3.onchange = () => {
                if (!l3.value) return;
                
                statusText.innerText = "⏳ 正在拉取高清原图...";
                const img = new Image();
                img.crossOrigin = "anonymous";
                
                img.onload = function() {
                    statusText.innerText = "⚙️ 正在压制 12K 超大纹理...";
                    
                    // 方案B核心：创建 Canvas 进行强制降采样
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // 浏览器支持的纹理上限通常为 8192px
                    const MAX_W = 8192;
                    if (img.width > MAX_W) {
                        canvas.width = MAX_W;
                        canvas.height = Math.floor(img.height * (MAX_W / img.width));
                    } else {
                        canvas.width = img.width;
                        canvas.height = img.height;
                    }

                    // 绘制缩放后的图像
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    // 将压缩后的 base64 数据传给渲染器，解决黑屏问题
                    sky.setAttribute('src', canvas.toDataURL("image/jpeg", 0.8));
                    statusText.innerText = "✅ 全景渲染成功！可转动视角";
                };

                img.onerror = () => {
                    statusText.innerText = "❌ 文件加载失败";
                };

                img.src = encodeURI(l3.value);
            };
        }
        document.getElementById('pass-input').addEventListener('keyup', (e) => { if (e.key === 'Enter') unlock(); });
    </script>
</body>
</html>
